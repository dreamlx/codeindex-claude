name: contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipx
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipx
          python -m pipx ensurepath
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install ai-codeindex from develop
        run: pipx install git+https://github.com/dreamlx/codeindex.git@develop

      - name: Show installed version
        run: codeindex --version

      - name: Contract test — every plugin-referenced CLI command exists
        run: bash tests/contract/check-commands.sh
